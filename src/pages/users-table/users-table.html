<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="onFilter($event)">
  <mat-hint>Search by substring</mat-hint>
</mat-form-field>
<table matSort mat-table [dataSource]="dataSource">
  <mat-text-column name="id" headerText="ID"></mat-text-column>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let user">{{user.name}}</td>
  </ng-container>
  <mat-text-column name="email" headerText="E-mail"></mat-text-column>
  <mat-text-column name="active" headerText="Active"></mat-text-column>
  <ng-container matColumnDef="lastLogin">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="lastLogin">Last Login</th>
    <td mat-cell *matCellDef="let user">{{user.lastLogin | date : 'd.M.yyyy h:mm:ss'}}</td>
  </ng-container>
  <ng-container matColumnDef="groups">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Groups</th>
    <td mat-cell *matCellDef="let user">
      {{user.groups | groupsToString}}
    </td>
  </ng-container>
  <ng-container matColumnDef="permissions">
    <th mat-header-cell *matHeaderCellDef>Permissions</th>
    <td mat-cell *matCellDef="let user">
      {{user.groups | groupsToString: 'permissions'}}
    </td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let user">
      <a matIconButton aria-label="delete user" routerLink="/user/edit/{{user.id}}">
        <mat-icon>edit</mat-icon>
      </a>
      <button matIconButton aria-label="delete user" (click)="deleteUser(user)">
        <mat-icon class="red">delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns()"></tr>
  <tr mat-row *matRowDef="let user; columns: columns()"></tr>
</table>
<mat-paginator [length]="100"
              [pageSize]="2"
              [pageSizeOptions]="[2, 5, 10, 25, 100]"
              aria-label="Select page">
</mat-paginator>

<a routerLink="/user/new" matButton routerLinkActive="active"><mat-icon>person_add</mat-icon> New user</a>
